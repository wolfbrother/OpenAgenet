[server]
host = "127.0.0.1"
port = 8001
endpoint = "http://localhost:8001"

[cors]
allowed_origins = [
  "http://localhost:5173",
  "http://127.0.0.1:5173",
  "https://openagenet.github.io",
  "https://openagenet.github.io/oan-site",
]

[node]
name = "Registrar Node"
role = "registrar"
did_semantic_code = "AGRG"

[upstream]
root_endpoint = "http://localhost:8000"

[security.upstream]
protocol_label = "ans-2026"
root_did = "did:ans:AGRT:ef6acvLB7aJ2WZVGmzb5hy4hwpuNbyh2e1yjWugrQLyEAm"

[security.submit]
max_in_flight = 32
retry_after_seconds = 1
upstream_timeout_ms = 15000

[paths]
data_dir = "../../data/registrar"
records_dir = "../../data/registrar/records"
database_url = "sqlite:../../data/registrar/registrar.db"
