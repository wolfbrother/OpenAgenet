[server]
host = "127.0.0.1"
port = 8003
endpoint = "http://localhost:8003"

[cors]
allowed_origins = [
  "http://localhost:5173",
  "http://127.0.0.1:5173",
  "https://openagenet.github.io",
  "https://openagenet.github.io/oan-site",
]

[service]
name = "CDN Service"
role = "cdn-service"
provider = "local"

[security.admin]
mode = "static-token"
static_tokens = ["local-dev-admin-token"]

[security.trusted_upstream]
root_did = "did:ans:AGRT:ef6acvLB7aJ2WZVGmzb5hy4hwpuNbyh2e1yjWugrQLyEAm"

[upstream]
root_endpoint = "http://localhost:8000"

[paths]
data_dir = "../../data/cdn"
manifest_file = "../../data/cdn/manifest.json"
documents_dir = "../../data/cdn/documents"
metadata_dir = "../../data/cdn/metadata"
packages_dir = "../../data/cdn/packages"
database_url = "sqlite:../../data/cdn/cdn.db"
